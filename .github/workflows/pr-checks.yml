name: PR checks

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml snowflake-connector-python
      - name: Validate DEV authored files
        run: python deploy/deploy.py --env dev --validate-only
