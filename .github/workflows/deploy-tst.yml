name: Deploy TST

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-tst
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: snowflake-tst
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install snowflake-connector-python pyyaml

      # Generate TST files in the runner's working dir (not committed).
      - name: Generate TST folder from DEV
        run: python deploy/convert_env.py --from dev --to tst

      - name: Deploy to TST
        env:
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: python deploy/deploy.py --env tst
