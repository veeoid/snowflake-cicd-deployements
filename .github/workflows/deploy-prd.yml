name: Deploy PRD

on:
  push:
    branches: [release/**]
  workflow_dispatch:

concurrency:
  group: deploy-prd
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: snowflake-prd # required-reviewer gate
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install snowflake-connector-python pyyaml

      # rebuild the chain fresh from DEV: dev->tst->prd
      - name: Generate PRD folder via chain
        run: |
          python deploy/convert_env.py --from dev --to tst
          python deploy/convert_env.py --from tst --to prd

      - name: Commit generated TST and PRD folders
        run: |
          git config user.name  "convert-bot"
          git config user.email "convert-bot@users.noreply.github.com"
          for d in MY_PROJECT_PREP_TST MY_PROJECT_ANALYTICS_TST \
                   MY_PROJECT_PREP_PRD MY_PROJECT_ANALYTICS_PRD; do
            [ -d "$d" ] && git add "$d"
          done
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Generate TST/PRD folders [skip-convert]"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi

      - name: Deploy to PRD
        env:
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: python deploy/deploy.py --env prd

      - name: Tag the release
        run: |
          TAG="v${GITHUB_REF_NAME#release/}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG exists"
          else
            git tag -a "$TAG" -m "Deployed to PRD from ${GITHUB_REF_NAME}"
            git push origin "$TAG"
          fi
