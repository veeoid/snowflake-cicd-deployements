name: Deploy PRD

on:
  push:
    branches: [release/**]
  workflow_dispatch:

concurrency:
  group: deploy-prd
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: snowflake-prd # required-reviewer gate
    permissions:
      contents: write # only to push the tag
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install snowflake-connector-python pyyaml

      # PRD is generated from the TST rule (tst->prd) in the runner, not committed.
      - name: Generate PRD folder from DEV via chain
        run: |
          python deploy/convert_env.py --from dev --to tst
          python deploy/convert_env.py --from tst --to prd

      - name: Deploy to PRD
        env:
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: python deploy/deploy.py --env prd

      - name: Tag the release
        run: |
          git config user.name  "deploy-bot"
          git config user.email "deploy-bot@users.noreply.github.com"
          TAG="v${GITHUB_REF_NAME#release/}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG exists"
          else
            git tag -a "$TAG" -m "Deployed to PRD from ${GITHUB_REF_NAME}"
            git push origin "$TAG"
          fi
