name: Deploy PRD

on:
  push:
    branches: [release/**]
  workflow_dispatch:

concurrency:
  group: deploy-prd
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: snowflake-prd # <-- required reviewer gate lives here
    permissions:
      contents: write # to push the tag
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install snowflake-connector-python pyyaml jinja2

      - name: Deploy to PRD
        env:
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: python deploy/deploy.py --env prd

      - name: Tag this release
        run: |
          git config user.name  "deploy-bot"
          git config user.email "deploy-bot@users.noreply.github.com"
          # tag name from the release branch, e.g. release/0.1 -> v0.1
          TAG="v${GITHUB_REF_NAME#release/}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping"
          else
            git tag -a "$TAG" -m "Deployed to PRD from ${GITHUB_REF_NAME}"
            git push origin "$TAG"
            echo "Tagged $TAG"
          fi
